<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}} | Entropy Makeup</title>
  <script src="../../assets/config.js"></script>
  <script>
    window.REPORT_PORTAL_AUTH = {
      ...(window.REPORT_PORTAL_AUTH || {}),
      assetBase: "../../assets/"
    };
  </script>
  <script src="../../assets/gate.js"></script>
  <link rel="stylesheet" href="../../assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a class="brand" href="../../" aria-label="Entropy Makeup Report Hub">
        <span class="brand-logos">
          <img class="brand-mark" src="../../assets/entropy-logo-bk.png" alt="Entropy Makeup" />
          <span class="brand-logo-separator" aria-hidden="true"></span>
          <img class="brand-mark brand-mark-morandi" src="../../assets/morandi-logo.png" alt="Morandi Park" />
        </span>
        <span class="brand-text">{{brand_title}}<small>{{brand_subtitle}}</small></span>
      </a>
      <div class="top-actions" aria-label="보고서 상태">
        <span class="badge badge-decision">의사결정 필요</span>
        <span class="badge {{status_class}}">{{status_label}}</span>
        <span class="chip" data-page-read-state>읽음 처리됨</span>
        <button class="ghost-button" type="button" data-page-read-toggle>읽지 않음으로 표시</button>
        <span class="chip">업데이트 {{updated_at_display}}</span>
      </div>
    </div>
  </header>

  <main data-report-page data-report-slug="{{slug}}" data-report-updated-at="{{updated_at}}">
    <section class="report-hero">
      <div class="wrap report-hero-grid">
        <div>
          <div class="eyebrow">{{surface_kicker}}</div>
          <h1>{{title}}</h1>
          <p class="report-summary">{{summary}}</p>
        </div>
        <div class="meta-grid" aria-label="보고서 메타 정보">
          {{meta_items}}
        </div>
      </div>
    </section>

    <section class="report-map" aria-labelledby="toc-title">
      <div class="wrap">
        <div class="section-head">
          <div>
            <div class="section-kicker">{{toc_kicker}}</div>
            <h2 id="toc-title">{{toc_title}}</h2>
          </div>
        </div>
        <nav class="toc-grid" aria-label="문서 목차">
          {{toc_items}}
        </nav>
      </div>
    </section>

    {{sections}}
  </main>

  <footer class="footer">
    <div class="wrap line">Entropy Makeup · {{footer_label}} · 기준일 {{updated_at_display}}</div>
  </footer>
  <script src="../../assets/app.js" defer></script>
</body>
</html>
